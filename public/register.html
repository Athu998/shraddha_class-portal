<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration</title>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container-box {
      display: flex;
      width: 1000px;
      max-width: 95%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    /* Left Panel */
    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-panel h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .left-panel p {
      opacity: 0.9;
    }

    /* Right Panel */
    .right-panel {
      flex: 1;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      overflow-y: auto;
      max-height: 90vh;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e293b;
    }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-group i {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #888;
    }

    input, select {
      width: 100%;
      padding: 10px 10px 10px 38px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .login-link {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .login-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .footer a {
      color: #0a66c2;
      text-decoration: none;
      font-weight: 500;
    }

    @media(max-width:768px){
      .container-box {
        flex-direction: column;
      }
      .left-panel {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="container-box">

  <!-- Left Branding -->
  <div class="left-panel">
    <h1>🎓 Shraddha Classes ERP</h1>
    <p>Create your account and access attendance, notes, and progress easily.</p>
  </div>

  <!-- Right Form -->
  <div class="right-panel">
    <h2>📝 Student Registration</h2>

   <form action="/admin/register" method="POST">

      <div class="input-group">
        <i class="bi bi-person"></i>
        <input type="text" name="name" placeholder="Full Name" required>
      </div>

      <div class="input-group">
        <i class="bi bi-calendar"></i>
        <input type="date" name="dob" required>
      </div>

      <div class="input-group">
        <i class="bi bi-building"></i>
        <input type="text" name="school_name" placeholder="School Name" required>
      </div>

      <div class="input-group">
        <i class="bi bi-mortarboard"></i>
        <select name="className" required>
          <option value="">Select Class</option>
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option><option>9</option>
          <option>10</option>
        </select>
      </div>

      <div class="input-group">
        <i class="bi bi-bar-chart"></i>
        <input type="number" name="last_year_marks" placeholder="Last Year Marks (%)" required>
      </div>

      <div class="input-group">
        <i class="bi bi-telephone"></i>
        <input type="text" name="parent_contact" placeholder="Parent Contact" required>
      </div>

      <div class="input-group">
        <i class="bi bi-geo-alt"></i>
        <input type="text" name="address" placeholder="Address" required>
      </div>

      <div class="input-group">
        <i class="bi bi-envelope"></i>
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <button type="submit">
        <i class="bi bi-person-plus"></i> Register
      </button>

    </form>

    <div class="login-link">
      Already registered? <a href="/students/login-form">Login</a>
    </div>

    <div class="footer">
      Developed by <b>Atharva More</b> |
      <a href="https://www.linkedin.com/in/atharva-more-34a015194/" target="_blank">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
    </div>

  </div>

</div>

</body>
</html>
