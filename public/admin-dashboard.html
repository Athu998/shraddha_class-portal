<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 bg-dark text-white p-4" style="height:100vh;">
      <h3>📊 Admin Panel</h3>
      <hr>
      <p>Dashboard</p>
      <p>Students</p>
      <p>Attendance</p>
      <p>Notes</p>
      <a href="/admin/logout" class="btn btn-danger mt-3">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 p-4">

      <h2>👋 Welcome, Admin</h2>

      <!-- Cards -->
      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card text-center p-3 shadow">
            <h5>Total Students</h5>
            <h2>120</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center p-3 shadow">
            <h5>Present Today</h5>
            <h2>85</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center p-3 shadow">
            <h5>Notes Uploaded</h5>
            <h2>12</h2>
          </div>
        </div>
      </div>

      <!-- Attendance Table -->
      <div class="card mt-4 p-3 shadow">
        <h4>📋 Mark Attendance</h4>

        <table class="table table-hover mt-3">
          <thead class="table-primary">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Student Name</td>
              <td>email@gmail.com</td>
              <td>
                <input type="radio"> Present
                <input type="radio"> Absent
              </td>
            </tr>
          </tbody>
        </table>

        <button class="btn btn-success">Submit Attendance</button>
      </div>

      <!-- Upload Notes -->
      <div class="card mt-4 p-3 shadow">
        <h4>📤 Upload Notes</h4>

        <input class="form-control mb-2" placeholder="Note Title">
        <input class="form-control mb-2" placeholder="Student ID">
        <input type="file" class="form-control mb-2">

        <button class="btn btn-primary">Upload</button>
      </div>

    </div>

  </div>
</div>

</body>
</html>
