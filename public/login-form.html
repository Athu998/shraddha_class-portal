<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      display: flex;
      width: 900px;
      max-width: 95%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    /* Left Branding */
    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-panel h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .left-panel p {
      opacity: 0.9;
    }

    /* Right Form */
    .right-panel {
      flex: 1;
      background: rgba(255,255,255,0.95);
      padding: 40px;
    }

    h2 {
      margin-bottom: 25px;
      text-align: center;
      color: #1e293b;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #888;
    }

    input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .register-link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .register-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }

    .footer a {
      color: #0a66c2;
      text-decoration: none;
      font-weight: 500;
    }

    @media(max-width:768px){
      .login-container {
        flex-direction: column;
      }
      .left-panel {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="login-container">

  <!-- Left Branding -->
  <div class="left-panel">
    <h1>🎓 Shraddha Classes ERP</h1>
    <p>Access your attendance, notes, and academic progress in one place.</p>
  </div>

  <!-- Right Form -->
  <div class="right-panel">
    <h2>🎓 Student Login</h2>

    <form action="/students/login" method="POST">

      <div class="input-group">
        <i class="bi bi-person"></i>
        <input type="text" name="name" placeholder="Enter Name" required>
      </div>

      <div class="input-group">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="Enter Password" required>
      </div>

      <button type="submit">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </button>
    </form>

    <div class="register-link">
      Not registered? <a href="/students/register-form">Register Now</a>
    </div>

    <div class="footer">
      Developed by <b>Atharva More</b> |
      <a href="https://www.linkedin.com/in/atharva-more-34a015194/" target="_blank">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
    </div>
  </div>

</div>

</body>
</html>
